<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayas AI - Chat & Image Generator</title>
    <!-- Tailwind CSS for faster styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chat-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <!-- Header -->
    <header class="glass-panel w-full py-4 px-6 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-bolt text-xl text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">FAYAS AI</h1>
        </div>
        <div class="flex items-center gap-2 text-sm text-slate-400">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>Live System</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 w-full max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6 h-[calc(100vh-140px)]">
        
        <!-- Left Column: Chat Area -->
        <div class="glass-panel rounded-2xl p-4 flex flex-col justify-between h-full shadow-2xl">
            <!-- Chat Box Box -->
            <div id="chat-box" class="chat-scroll flex-1 overflow-y-auto space-y-4 pr-1 text-sm md:text-base mb-4">
                <!-- Welcome Message -->
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-robot text-xs"></i>
                    </div>
                    <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl rounded-tl-none p-3 max-w-[85%] text-slate-200 shadow-md">
                        Hello Fayas! I'm ready. You can chat with me or type <span class="text-blue-400 font-semibold">"create image [prompt]"</span> to generate photos directly.
                    </div>
                </div>
            </div>

            <!-- Input System -->
            <div class="relative flex items-center mt-2">
                <input type="text" id="user-input" placeholder="Ask anything or create an image..." 
                       class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl py-3.5 pl-4 pr-14 outline-none focus:border-blue-500 transition-all text-slate-200 placeholder-slate-500 shadow-inner">
                <button id="send-btn" class="absolute right-2 bg-blue-600 hover:bg-blue-500 transition-colors w-10 h-10 rounded-lg flex items-center justify-center text-white shadow-md shadow-blue-600/20 cursor-pointer">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- Right Column: Image Preview Area -->
        <div class="glass-panel rounded-2xl p-6 flex flex-col justify-between items-center h-full shadow-2xl relative">
            <div class="w-full border-b border-slate-800/60 pb-3 mb-4 flex justify-between items-center">
                <h2 class="text-md font-semibold tracking-wide text-slate-300 flex items-center gap-2">
                    <i class="fa-solid fa-image text-blue-400"></i> Image Preview Area
                </h2>
                <button id="download-btn" disabled class="text-sm bg-slate-800 border border-slate-700 hover:bg-slate-700 disabled:opacity-40 disabled:hover:bg-slate-800 px-3 py-1.5 rounded-lg transition-all flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-download"></i> Save Image
                </button>
            </div>

            <!-- Preview Frame -->
            <div class="flex-1 w-full bg-slate-950/40 border border-slate-900 rounded-xl flex flex-col items-center justify-center overflow-hidden p-4 min-h-[250px]">
                <div id="preview-placeholder" class="text-center space-y-3">
                    <div class="w-16 h-16 rounded-full bg-slate-900 flex items-center justify-center mx-auto border border-slate-800">
                        <i class="fa-regular fa-images text-2xl text-slate-500"></i>
                    </div>
                    <p class="text-sm text-slate-500 max-w-[220px] mx-auto">Generated images will be displayed instantly here.</p>
                </div>
                <img id="output-image" class="hidden max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-slate-800" src="" alt="AI Generated Output">
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-3 text-xs text-slate-600 border-t border-slate-900/40">
        &copy; 2026 Fayas AI Builder. All rights reserved.
    </footer>

    <!-- JavaScript Backend Connection Logic -->
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const placeholder = document.getElementById('preview-placeholder');
        const outputImage = document.getElementById('output-image');
        const downloadBtn = document.getElementById('download-btn');

        let currentImageBlobUrl = null;

        async function handleSubmission() {
            const query = userInput.value.trim();
            if (!query) return;

            // 1. Append User Bubble
            appendBubble('user', query);
            userInput.value = '';
            scrollToBottom();

            // 2. Core Routing Check: Text vs Image Generation
            const lowerQuery = query.toLowerCase();
            if (lowerQuery.startsWith('create image') || lowerQuery.startsWith('generate image')) {
                await generateImage(query);
            } else {
                await fetchTextResponse(query);
            }
        }

        // --- API Integration Functions ---

        async function fetchTextResponse(prompt) {
            const botBubbleId = appendLoadingBubble();
            scrollToBottom();

            try {
                // Connecting to free Pollinations text routing endpoint
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: prompt }],
                        model: 'openai'
                    })
                });
                const text = await response.text();
                updateLoadingBubble(botBubbleId, text);
            } catch (error) {
                updateLoadingBubble(botBubbleId, `Error matching stream request: ${error.message}`);
            }
            scrollToBottom();
        }

        async function generateImage(prompt) {
            const botBubbleId = appendBubble('bot', '<i class="fa-solid fa-spinner animate-spin mr-2"></i> Initializing Flux core engine... Please wait.');
            scrollToBottom();

            // Clean prompt descriptors
            const cleanPrompt = prompt.replace(/(create image|generate image)/gi, '').trim();
            
            // Constructing clean Pollinations Flux URL directly
            const encodedPrompt = encodeURIComponent(cleanPrompt);
            const targetImageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&model=flux&nologo=true&private=true`;

            try {
                const imgRes = await fetch(targetImageUrl);
                if (!imgRes.ok) throw new Error("Network image fetch failure.");
                
                const blob = await imgRes.blob();
                
                // Revoke old URL to clean memory leaks
                if (currentImageBlobUrl) URL.revokeObjectURL(currentImageBlobUrl);
                
                currentImageBlobUrl = URL.createObjectURL(blob);

                // Update UI Elements
                placeholder.classList.add('hidden');
                outputImage.src = currentImageBlobUrl;
                outputImage.classList.remove('hidden');

                downloadBtn.removeAttribute('disabled');
                
                const botBubble = document.getElementById(botBubbleId);
                botBubble.innerHTML = "Image successfully rendered in your preview frame!";
            } catch (error) {
                const botBubble = document.getElementById(botBubbleId);
                botBubble.innerHTML = `Failed to generate photo: ${error.message}`;
            }
            scrollToBottom();
        }

        // --- Helper Rendering Utilities ---

        function appendBubble(sender, content) {
            const id = 'b-' + Math.random().toString(36).substr(2, 9);
            const wrapper = document.createElement('div');
            wrapper.className = 'flex items-start gap-3 ' + (sender === 'user' ? 'justify-end' : '');

            const avatar = sender === 'user' 
                ? `<div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shrink-0 order-2"><i class="fa-solid fa-user text-xs"></i></div>`
                : `<div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-robot text-xs"></i></div>`;

            const alignmentClass = sender === 'user' 
                ? 'bg-blue-600 text-white rounded-tr-none shadow-blue-600/10' 
                : 'bg-slate-800/60 border border-slate-700/50 text-slate-200 rounded-tl-none';

            wrapper.innerHTML = `
                ${avatar}
                <div id="${id}" class="${alignmentClass} rounded-2xl p-3 max-w-[85%] shadow-md whitespace-pre-wrap leading-relaxed">
                    ${content}
                </div>
            `;
            chatBox.appendChild(wrapper);
            return id;
        }

        function appendLoadingBubble() {
            return appendBubble('bot', '<span class="flex gap-1 items-center py-1"><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></span></span>');
        }

        function updateLoadingBubble(id, content) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = content;
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- Event Listeners ---

        sendBtn.addEventListener('click', handleSubmission);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmission();
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentImageBlobUrl) return;
            const a = document.createElement('a');
            a.href = currentImageBlobUrl;
            a.download = `fayas_ai_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
